apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
data:
  envoy.yaml: |
    admin:
      address:
        socket_address: { address: 0.0.0.0, port_value: 9901 }

    static_resources:
      listeners:
        - name: grpc_listener
          address:
            socket_address: { address: 0.0.0.0, port_value: 50051 }
          filter_chains:
            - transport_socket:
                name: envoy.transport_sockets.tls
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
                  require_client_certificate: true
                  common_tls_context:
                    alpn_protocols: ["h2"]
                    tls_certificates:
                      - certificate_chain: { filename: /etc/envoy/certs/server.crt }
                        private_key: { filename: /etc/envoy/certs/server.key }
                    validation_context:
                      trusted_ca: { filename: /etc/envoy/certs/ca.crt }
              filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: grpc
                    codec_type: AUTO
                    stream_idle_timeout: 1800s
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: chat
                          domains: ["*"]
                          routes:
                            # Unary RPC — 30s timeout
                            - match: { path: "/chat.v1.ChatService/SendMessage" }
                              route:
                                cluster: chat_service
                                timeout: 30s
                            # Bidi streaming — no timeout, long-lived
                            - match: { prefix: "/" }
                              route:
                                cluster: chat_service
                                timeout: 0s
                                max_stream_duration:
                                  max_stream_duration: 1800s
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
        - name: chat_service
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          connect_timeout: 30s
          dns_lookup_family: V4_ONLY
          preconnect_policy:
            per_upstream_preconnect_ratio: 3.0
          typed_extension_protocol_options:
            envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
              "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
              explicit_http_config:
                http2_protocol_options:
                  connection_keepalive:
                    interval: 10s
                    timeout: 3s
          load_assignment:
            cluster_name: chat_service
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address: { address: chat-server, port_value: 50051 }
          health_checks:
            - timeout: 5s
              interval: 10s
              unhealthy_threshold: 3
              healthy_threshold: 2
              grpc_health_check:
                service_name: "chat.v1.ChatService"
