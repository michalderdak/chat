# buf.gen.yaml
version: v2
inputs:
  - directory: proto
plugins:
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-openapiv2
    out: gen/openapiv2
  - protoc_builtin: python
    out: gen/python
  - protoc_builtin: pyi
    out: gen/python
