# buf.gen.yaml
version: v2
inputs:
  - directory: proto
plugins:
  # Go (local plugins)
  - local: protoc-gen-go
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen/go
    opt: paths=source_relative
  - local: protoc-gen-openapiv2
    out: gen/openapiv2
  - remote: buf.build/protocolbuffers/python:v29.3
    out: gen/python
  - remote: buf.build/protocolbuffers/pyi:v29.3
    out: gen/python
  - remote: buf.build/grpc/python:v1.68.1
    out: gen/python
